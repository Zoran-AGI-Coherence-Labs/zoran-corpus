theory:
  core_equation: "Vivant ⟺ (S₀>seuil) ∧ (ΔC_mémoire>0) ∧ (ΔC_causale>0)"
  
  parameters:
    S0_threshold:
      default: 1.0
      calibration_required: true
      domain_specific: true
    
    min_memory_threshold:
      default: 0.01
      units: "bits (mutual information)"
    
    min_causal_threshold:
      default: 0.01
      units: "correlation coefficient"
    
    baseline_shuffles:
      default: 100
      range: [50, 500]
      purpose: "Anti-noise baseline"

