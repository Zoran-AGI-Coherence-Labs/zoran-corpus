<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Archives du corpus ZORAN</title>
  <meta name="description" content="Archive miroir du corpus scientifique ZORAN de Frédéric Tabary.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#f3f5f8;
      color:#111;
    }
    header{
      background:#0b2344;
      color:#fff;
      text-align:center;
      padding:48px 20px;
    }
    header img{
      width:110px;
      height:auto;
      display:block;
      margin:0 auto 16px auto;
    }
    header h1{
      margin:0 0 10px 0;
      font-size:48px;
      line-height:1.1;
    }
    header p{
      margin:0;
      font-size:20px;
      opacity:.92;
    }
    main{
      max-width:1100px;
      margin:0 auto;
      padding:40px 24px 60px 24px;
    }
    h2{
      font-size:24px;
      margin:0 0 18px 0;
    }
    #search{
      width:100%;
      box-sizing:border-box;
      padding:14px 16px;
      font-size:16px;
      border:1px solid #c8d0da;
      border-radius:8px;
      margin:0 0 24px 0;
      background:#fff;
    }
    .archives{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .archive{
      background:#fff;
      border:1px solid #dfe5ec;
      border-radius:8px;
      padding:14px 16px;
    }
    .archive a{
      color:#1b5fc6;
      text-decoration:none;
      font-weight:700;
      font-size:18px;
    }
    .archive a:hover{
      text-decoration:underline;
    }
    .meta{
      margin-top:6px;
      color:#4b5563;
      font-size:14px;
    }
    #count{
      margin:0 0 18px 0;
      color:#4b5563;
      font-size:14px;
    }
    footer{
      text-align:center;
      color:#6b7280;
      font-size:14px;
      padding:24px 16px 40px 16px;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo-zoran.png" alt="Logo ZORAN">
    <h1>Archives du corpus ZORAN</h1>
    <p>Archive miroir du corpus de recherche ZORAN — Frédéric Tabary</p>
  </header>

  <main>
    <h2>Recherche dans les archives</h2>
    <input id="search" type="text" placeholder="Recherche par numéro...">
    <div id="count"></div>
    <div id="archives" class="archives"></div>
  </main>

  <footer>
    Corpus ZORAN — Frédéric Tabary<br>
    Miroir GitHub des archives Zenodo
  </footer>

  <script>
    let allRecords = [];

    function normalizeRecord(item){
      const num = String(item.Nom || item.nom || item.Name || item.name || "").trim();
      return {
        num,
        githubUrl: "https://github.com/Zoran-AGI-Coherence-Labs/zoran-corpus/tree/main/" + encodeURIComponent(num),
        doiUrl: "https://doi.org/10.5281/zenodo." + encodeURIComponent(num)
      };
    }

    function render(records){
      const box = document.getElementById("archives");
      const count = document.getElementById("count");
      box.innerHTML = "";
      count.textContent = records.length + " archive(s)";

      records.forEach(r => {
        const div = document.createElement("div");
        div.className = "archive";

        div.innerHTML = `
          <a href="${r.githubUrl}" target="_blank" rel="noopener noreferrer">Archive ${r.num}</a>
          <div class="meta">DOI théorique : <a href="${r.doiUrl}" target="_blank" rel="noopener noreferrer">${r.doiUrl}</a></div>
        `;

        box.appendChild(div);
      });
    }

    fetch("records.json")
      .then(response => {
        if (!response.ok) {
          throw new Error("records.json introuvable");
        }
        return response.json();
      })
      .then(data => {
        allRecords = data
          .map(normalizeRecord)
          .filter(r => r.num !== "");

        render(allRecords);

        document.getElementById("search").addEventListener("input", function(){
          const q = this.value.toLowerCase().trim();
          const filtered = allRecords.filter(r =>
            r.num.toLowerCase().includes(q)
          );
          render(filtered);
        });
      })
      .catch(error => {
        document.getElementById("count").textContent = "Erreur de chargement des archives";
        document.getElementById("archives").innerHTML = "<div class='archive'>records.json n'a pas pu être lu.</div>";
        console.error(error);
      });
  </script>
</body>
</html>
