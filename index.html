<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>ZORAN Corpus Archive</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<img src="logo-zoran.png" width="120">
<h1>Archives du corpus ZORAN</h1>
<p>Archive miroir du corpus de recherche ZORAN — Frédéric Tabary</p>
</header>

<div class="container">

<h2>Recherche dans les archives</h2>

<input id="search" type="text" placeholder="Recherche par numéro...">

<div id="results"></div>

</div>

<script>

fetch("records.json")
.then(r => r.json())
.then(data => {

display(data)

document.getElementById("search").addEventListener("keyup", function(){

let value = this.value.toLowerCase()

let filtered = data.filter(r =>
r.Nom.toLowerCase().includes(value)
)

display(filtered)

})

function display(list){

let container = document.getElementById("results")
container.innerHTML = ""

list.forEach(item => {

let div = document.createElement("div")
div.className = "archive"

div.innerHTML =
'<a href="https://github.com/Zoran-AGI-Coherence-Labs/zoran-corpus/tree/main/'+item.Nom+'" target="_blank">Archive '+item.Nom+'</a>'

container.appendChild(div)

})

}

})

</script>

</body>
</html>
