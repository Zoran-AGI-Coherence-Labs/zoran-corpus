<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Loi de la Cohérence Phénoménale — Archives DOI</title>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f4f6f8;
}

header{
background:#0b2a4a;
color:white;
text-align:center;
padding:50px 20px;
}

header img{
width:120px;
margin-bottom:15px;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.archive{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.archive a{
color:#0b57d0;
text-decoration:none;
}

.archive a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<header>

<img src="logo-zoran.png">

<h1>Loi de la cohérence phénoménale</h1>

<div>S = (β × ΔΦ) / (T × σ)</div>

</header>


<div class="container">

<h2>Archives DOI</h2>

<div id="archives"></div>

</div>



<script>

fetch('records.json')
.then(response => response.json())
.then(data => {

let container = document.getElementById('archives')

data.forEach(record => {

let div = document.createElement('div')
div.className = 'archive'

div.innerHTML = `
<b>${record.title}</b><br>
DOI : <a href="${record.doi}" target="_blank">${record.doi}</a><br>
ID archive : ${record.id}<br>
Thème : ${record.theme}
`

container.appendChild(div)

})

})

</script>

</body>
</html>
