<<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZORAN — Loi de la cohérence phénoménale</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#f4f6f9; color:#1a1a2e; }

header {
  background: #1a2a4a;
  padding: 2.5rem 1rem 2rem;
  text-align: center;
  color: white;
}
header img { width:110px; margin-bottom:1rem; }
header h1 { font-size:1.6rem; font-weight:700; margin-bottom:0.4rem; }
header p { font-size:0.95rem; opacity:0.8; }

.container { max-width:1000px; margin:0 auto; padding:2rem 1rem; }

.controls {
  display:flex; gap:0.75rem; flex-wrap:wrap;
  margin-bottom:1.5rem; align-items:center;
}
.controls input {
  flex:1; min-width:200px;
  padding:0.6rem 1rem;
  border:1.5px solid #dde;
  border-radius:4px;
  font-size:0.85rem;
  outline:none;
}
.controls input:focus { border-color:#2F6BFF; }

.themes { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.5rem; }
.themes button {
  padding:0.35rem 0.9rem;
  border:1.5px solid #ccd;
  background:white;
  border-radius:20px;
  font-size:0.72rem;
  cursor:pointer;
  transition:all 0.15s;
  font-weight:500;
}
.themes button:hover { border-color:#2F6BFF; color:#2F6BFF; }
.themes button.on { background:#2F6BFF; border-color:#2F6BFF; color:white; }

.count { font-size:0.78rem; color:#888; margin-bottom:1rem; }

.grid { display:flex; flex-direction:column; gap:0.5rem; }

.card {
  background:white;
  border:1px solid #e8eaf0;
  border-left:4px solid #2F6BFF;
  padding:1rem 1.2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:1rem;
  text-decoration:none;
  color:inherit;
  transition:box-shadow 0.15s, border-left-color 0.15s;
}
.card:hover { box-shadow:0 2px 12px rgba(47,107,255,0.12); border-left-color:#1E3A8A; }

.card-left { flex:1; }
.card-title { font-size:0.9rem; font-weight:600; color:#1a1a2e; margin-bottom:0.3rem; line-height:1.3; }
.card-doi { font-size:0.72rem; color:#2F6BFF; font-family:monospace; }

.card-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.3rem; flex-shrink:0; }
.badge {
  padding:0.2rem 0.6rem;
  border-radius:3px;
  font-size:0.62rem;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
}
.year { font-size:0.68rem; color:#aaa; }

/* Badge colors */
.SCIENCE { background:#EEF3FF; color:#2F6BFF; }
.IA { background:#F0FDF4; color:#16A34A; }
.CONSCIENCE { background:#FDF4FF; color:#9333EA; }
.ENGINES { background:#FFF7ED; color:#EA580C; }
.PHYSIQUE { background:#F0FDFA; color:#0D9488; }
.VIVANT { background:#F7FEE7; color:#65A30D; }
.SOCIETE { background:#FFF1F2; color:#E11D48; }
.EDUCATION { background:#FFFBEB; color:#D97706; }
.LIVRES { background:#FEFCE8; color:#CA8A04; }

.empty { text-align:center; padding:3rem; color:#aaa; font-size:0.9rem; }
</style>
</head>
<body>

<header>
  <img src="logo-zoran.png" alt="Zoran">
  <h1>Loi de la cohérence phénoménale</h1>
  <p>S = (β × ΔΦ) / (T × σ) &nbsp;·&nbsp; Frédéric Tabary &nbsp;·&nbsp; Institut IA Inc.</p>
</header>

<div class="container">

  <div class="controls">
    <input type="text" id="q" placeholder="Rechercher un titre, un DOI…">
  </div>

  <div class="themes" id="themes"></div>

  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>

</div>

<script>
fetch('records.json')
  .then(r => r.json())
  .then(data => init(data))
  .catch(e => {
    document.getElementById('grid').innerHTML = '<div class="empty">Erreur de chargement — ' + e.message + '</div>';
  });

function init(DATA) {
  const THEMES = ['TOUS', ...new Set(DATA.map(d => d.theme).filter(Boolean).sort())];
  let active = 'TOUS';

  // Build theme pills
  const tEl = document.getElementById('themes');
  THEMES.forEach(th => {
    const b = document.createElement('button');
    b.textContent = th;
    b.className = th === 'TOUS' ? 'on' : '';
    b.onclick = () => {
      active = th;
      document.querySelectorAll('.themes button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      render();
    };
    tEl.appendChild(b);
  });

  document.getElementById('q').addEventListener('input', render);

  function render() {
    const q = document.getElementById('q').value.toLowerCase().trim();
    const filtered = DATA.filter(d => {
      const mT = active === 'TOUS' || d.theme === active;
      const mQ = !q || (d.title||'').toLowerCase().includes(q) || (d.id||'').includes(q);
      return mT && mQ;
    });

    document.getElementById('count').textContent = filtered.length + ' publication' + (filtered.length > 1 ? 's' : '');

    const grid = document.getElementById('grid');
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty">Aucun résultat</div>';
      return;
    }

    grid.innerHTML = filtered.map(d => `
      <a class="card" href="${d.doi}" target="_blank" rel="noopener">
        <div class="card-left">
          <div class="card-title">${d.title}</div>
          <div class="card-doi">${d.doi}</div>
        </div>
        <div class="card-right">
          <span class="badge ${d.theme}">${d.theme}</span>
          <span class="year">${d.year}</span>
        </div>
      </a>
    `).join('');
  }

  render();
}
</script>
</body>
</html>
