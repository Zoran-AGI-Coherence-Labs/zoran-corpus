<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>ZORAN Corpus Archive</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="logo-zoran.png" width="120">

<h1>Archives du corpus ZORAN</h1>

<p>
Archive miroir du corpus de recherche ZORAN — Frédéric Tabary
</p>

</header>


<div class="container">

<h2>Recherche dans les archives</h2>

<div class="search">
<input type="text" id="search" placeholder="Recherche par numéro, mot clé, titre...">
</div>


<h2>Archives</h2>

<div id="archives"></div>

</div>


<footer>

Corpus ZORAN — Frédéric Tabary  
Mirror GitHub des archives Zenodo

</footer>


<script>

fetch("records.json")
.then(response => response.json())
.then(data => {

let container = document.getElementById("archives");

function display(records){

container.innerHTML = "";

records.forEach(record => {

let div = document.createElement("div");
div.className = "archive";

div.innerHTML =
"<a href='" + record.github_url + "' target='_blank'>Archive "
+ record.id +
"</a>";

container.appendChild(div);

});

}

display(data);

document.getElementById("search").addEventListener("keyup", function(){

let value = this.value.toLowerCase();

let filtered = data.filter(r =>
r.id.toLowerCase().includes(value) ||
r.title.toLowerCase().includes(value)
);

display(filtered);

});

});

</script>


</body>
</html>
