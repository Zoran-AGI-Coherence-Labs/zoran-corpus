<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ZORAN – Archive miroir</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#f3f5f8;
}

header{
background:#0b2344;
color:white;
text-align:center;
padding:50px 20px;
}

header h1{
margin:0;
font-size:40px;
}

header p{
margin-top:10px;
opacity:0.85;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.search{
width:100%;
padding:14px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:20px;
}

.filters{
margin-bottom:30px;
}

.filters button{
margin:5px;
padding:8px 14px;
border:none;
border-radius:6px;
background:#dfe6ef;
cursor:pointer;
}

.filters button:hover{
background:#cdd6e2;
}

.archive{
background:white;
padding:18px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

.archive a{
text-decoration:none;
color:#1b4dc1;
font-weight:bold;
}

.meta{
font-size:13px;
color:#666;
margin-top:5px;
}

</style>

</head>

<body>

<header>
<h1>Loi de la cohérence phénoménale</h1>
<p>S = (β × ΔΦ) / (T × σ)</p>
</header>

<div class="container">

<input id="search" class="search" placeholder="Recherche par numéro, titre, thème...">

<div class="filters">

<button onclick="filterTheme('all')">TOUT</button>
<button onclick="filterTheme('COHERENCE')">COHERENCE</button>
<button onclick="filterTheme('IA')">IA</button>
<button onclick="filterTheme('CONSCIENCE')">CONSCIENCE</button>
<button onclick="filterTheme('PHYSIQUE')">PHYSIQUE</button>

</div>

<div id="archives"></div>

</div>

<script>

let allRecords=[]

fetch("records.json")
.then(r=>r.json())
.then(data=>{
allRecords=data
display(data)
})

function display(records){

const container=document.getElementById("archives")
container.innerHTML=""

records.forEach(r=>{

let div=document.createElement("div")
div.className="archive"

div.innerHTML=`
<a href="${r.github}" target="_blank">${r.title}</a>
<div class="meta">DOI : <a href="${r.doi}" target="_blank">${r.doi}</a></div>
<div class="meta">ID archive : ${r.id}</div>
<div class="meta">Thème : ${r.theme}</div>
`

container.appendChild(div)

})

}

document.getElementById("search").addEventListener("keyup",function(){

let value=this.value.toLowerCase()

let filtered=allRecords.filter(r=>
r.id.toLowerCase().includes(value)||
r.title.toLowerCase().includes(value)||
r.theme.toLowerCase().includes(value)
)

display(filtered)

})

function filterTheme(theme){

if(theme==="all"){
display(allRecords)
return
}

let filtered=allRecords.filter(r=>r.theme===theme)

display(filtered)

}

</script>

</body>
</html>
